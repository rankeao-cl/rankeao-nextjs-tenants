                      type: object
  /api/v1/tenants/me/notifications/read-all:
    post:
      tags:
      - Tenants
      summary: Mark all notifications as read
      description: 'Mark all unread tenant notifications as read in a single operation.

        Requires auth, X-Tenant-ID header, and MANAGE_STORE grant.

        '
      operationId: markAllNotificationsRead
      security:
      - BearerAuth: []

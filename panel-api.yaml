  /api/v1/tenants/me/payment-methods:
    get:
      tags:
      - Tenants
      summary: List payment methods
      description: 'List all configured payment methods for the tenant (e.g., WEBPAY, MERCADOPAGO, BANK_TRANSFER, CASH, DEBIT).

        Requires auth, X-Tenant-ID header, and MANAGE_SETTINGS grant.

        '
      operationId: listPaymentMethods
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      responses:
        '200':
          description: Payment methods
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment_methods:
                    type: array
                    items:
                      $ref: '#/components/schemas/PaymentMethod'
    post:
      tags:
      - Tenants
      summary: Add payment method
      description: 'Add a new payment method to the tenant. Type must be one of: WEBPAY, MERCADOPAGO, BANK_TRANSFER,

        CASH, DEBIT. The config object contains provider-specific settings (e.g., commerce_code for Webpay).

        Requires auth, X-Tenant-ID header, and MANAGE_SETTINGS grant.

        '
      operationId: addPaymentMethod
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - type
              properties:
                type:
                  type: string
                  enum:
                  - WEBPAY
                  - MERCADOPAGO
                  - BANK_TRANSFER
                  - CASH
                  - DEBIT
                label:
                  type: string
                config:
                  type: object
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
  /api/v1/tenants/me/payment-methods/{payment_method_id}:
    patch:
      tags:
      - Tenants

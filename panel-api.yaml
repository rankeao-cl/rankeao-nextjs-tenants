openapi: 3.0.3
info:
  title: Rankeao Panel API
  description: Tenant dashboard API — store configuration, staff management, analytics, expenses, loyalty, subscriptions,
    product/order/inventory management.
  version: 1.0.0
  contact:
    name: Rankeao
    url: https://rankeao.cl
servers:
- url: https://api.rankeao.cl
  description: Production
tags:
- name: Auth
- name: Tenants
- name: Staff
- name: Analytics
- name: Expenses
- name: Loyalty
- name: Subscriptions
- name: Products
- name: Orders
- name: Inventory
- name: Coupons
security: []
paths:
  /api/v1/auth/forgot-password:
    post:
      tags:
      - Auth
      summary: Forgot password (not implemented)
      description: 'Initiates a password reset flow by sending a reset link to the user''s email.

        Not yet implemented — always returns 501.

        '
      operationId: forgotPassword
      responses:
        '501':
          description: Not implemented
  /api/v1/auth/login:
    post:
      tags:
      - Auth
      summary: Log in with email and password
      description: 'Authenticates a user with email and password, returning an access token and refresh token.

        Returns 401 with INVALID_CREDENTIALS if the email or password is wrong.

        No authentication required.

        '
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/oauth/apple/callback:
    get:
      tags:
      - Auth
      summary: Apple OAuth callback (not implemented)
      description: 'Handles the OAuth2 callback from Apple after the user authorizes.

        Creates or links an account and returns auth tokens.

        Not yet implemented — always returns 501.

        '
      operationId: oauthAppleCallback
      responses:
        '501':
          description: Not implemented
  /api/v1/auth/oauth/discord/callback:
    get:
      tags:
      - Auth
      summary: Discord OAuth callback (not implemented)
      description: 'Handles the OAuth2 callback from Discord after the user authorizes.

        Creates or links an account and returns auth tokens.

        Not yet implemented — always returns 501.

        '
      operationId: oauthDiscordCallback
      responses:
        '501':
          description: Not implemented
  /api/v1/auth/oauth/google/callback:
    get:
      tags:
      - Auth
      summary: Google OAuth callback (not implemented)
      description: 'Handles the OAuth2 callback from Google after the user authorizes.

        Creates or links an account and returns auth tokens.

        Not yet implemented — always returns 501.

        '
      operationId: oauthGoogleCallback
      responses:
        '501':
          description: Not implemented
  /api/v1/auth/refresh:
    post:
      tags:
      - Auth
      summary: Refresh access token
      description: 'Exchanges a valid refresh token for a new access/refresh token pair.

        The old refresh token is revoked upon successful exchange. If the refresh token

        is invalid, expired, or already revoked, returns 401. No authentication required.

        '
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - refresh_token
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/register:
    post:
      tags:
      - Auth
      summary: Register a new user
      description: 'Creates a new user account and returns an access token plus refresh token.

        Username must be 3-30 characters (alphanumeric + underscores), email must be valid,

        and password must be at least 8 characters. Returns 409 if the email or username is already taken.

        No authentication required.

        '
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/auth/reset-password:
    post:
      tags:
      - Auth
      summary: Reset password (not implemented)
      description: 'Resets the user''s password using a token received via the forgot-password email.

        Not yet implemented — always returns 501.

        '
      operationId: resetPassword
      responses:
        '501':
          description: Not implemented
  /api/v1/auth/verify-email:
    post:
      tags:
      - Auth
      summary: Verify email (not implemented)
      description: 'Verifies the user''s email address using a verification token.

        Not yet implemented — always returns 501.

        '
      operationId: verifyEmail
      responses:
        '501':
          description: Not implemented
  /api/v1/store/panel/coupons:
    get:
      tags:
      - Coupons
      summary: List coupons
      description: 'Lists coupons for the tenant store. Supports filtering by status (active, inactive,

        expired). Paginated (max 100 per page). Requires Bearer token + X-Tenant-ID header

        with MANAGE_COUPONS grant.

        '
      operationId: listCoupons
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      responses:
        '200':
          description: Coupons
          content:
            application/json:
              schema:
                type: object
                properties:
                  coupons:
                    type: array
                    items:
                      type: object
    post:
      tags:
      - Coupons
      summary: Create coupon
      description: 'Creates a new coupon for the tenant store. Code must be 3-30 characters and unique.

        Supports PERCENTAGE or FIXED discount types with optional min_purchase, max_discount,

        usage limits, validity dates, and product/category targeting. Returns DUPLICATE_CODE

        (400) if the code exists. Requires Bearer token + X-Tenant-ID header with MANAGE_COUPONS grant.

        '
      operationId: createCoupon
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Coupon created
          content:
            application/json:
              schema:
                type: object
  /api/v1/store/panel/coupons/{coupon_id}:
    patch:
      tags:
      - Coupons
      summary: Update coupon
      description: 'Partially updates a coupon''s settings. Only send the fields to change.

        Requires Bearer token + X-Tenant-ID header with MANAGE_COUPONS grant.

        '
      operationId: updateCoupon
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      - name: coupon_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
    delete:
      tags:
      - Coupons
      summary: Delete coupon
      description: 'Deactivates a coupon, making it unavailable for future use. Does not delete

        historical usage records. Requires Bearer token + X-Tenant-ID header with

        MANAGE_COUPONS grant.

        '
      operationId: deleteCoupon
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      - name: coupon_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
  /api/v1/store/panel/coupons/{coupon_id}/usages:
    get:
      tags:
      - Coupons
      summary: Get coupon usages
      description: 'Lists usage records for a specific coupon, showing which users redeemed it,

        the associated orders, and discount amounts. Includes a summary with total_uses

        and total_discount_given. Requires Bearer token + X-Tenant-ID header with

        MANAGE_COUPONS grant.

        '
      operationId: getCouponUsages
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      - name: coupon_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Usages
          content:
            application/json:
              schema:
                type: object
  /api/v1/store/panel/inventory/alerts:
    get:
      tags:
      - Inventory
      summary: Get inventory alerts
      description: 'Returns low-stock and out-of-stock alerts for the tenant''s products. Includes

        per-product stock levels and a summary with low_stock_count and out_of_stock_count.

        Requires Bearer token + X-Tenant-ID header with MANAGE_INVENTORY grant.

        '
      operationId: getInventoryAlerts
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      responses:
        '200':
          description: Alerts
          content:
            application/json:
              schema:
                type: object
  /api/v1/store/panel/inventory/movements:
    get:
      tags:
      - Inventory
      summary: List inventory movements
      description: 'Lists inventory stock change records for the tenant. Supports filtering by product,

        variant, movement type, and date range. Paginated (max 100 per page). Requires

        Bearer token + X-Tenant-ID header with MANAGE_INVENTORY grant.

        '
      operationId: listInventoryMovements
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      responses:
        '200':
          description: Movements
          content:
            application/json:
              schema:
                type: object
                properties:
                  movements:
                    type: array
                    items:
                      type: object
    post:
      tags:
      - Inventory
      summary: Create inventory movement
      description: 'Creates a manual stock adjustment for a product or variant. Positive quantity adds

        stock, negative removes it. Returns INSUFFICIENT_STOCK (409) if a negative adjustment

        exceeds available stock. Requires Bearer token + X-Tenant-ID header with

        MANAGE_INVENTORY grant.

        '
      operationId: createInventoryMovement
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Movement created
          content:
            application/json:
              schema:
                type: object
  /api/v1/store/panel/inventory/valuation:
    get:
      tags:
      - Inventory
      summary: Get inventory valuation
      description: 'Returns overall inventory valuation (total cost, retail value, potential margin)

        and a per-category breakdown. Requires Bearer token + X-Tenant-ID header with

        MANAGE_INVENTORY grant.

        '
      operationId: getInventoryValuation
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      responses:
        '200':
          description: Valuation
          content:
            application/json:
              schema:
                type: object
  /api/v1/store/panel/orders:
    get:
      tags:
      - Orders
      summary: List panel orders
      description: 'Lists orders for the tenant store. Supports filtering by status, date range,

        delivery method, and search by order number or buyer. Includes order count summary

        by status. Paginated (max 100 per page). Requires Bearer token + X-Tenant-ID

        header with MANAGE_ORDERS grant.

        '
      operationId: listPanelOrders
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      responses:
        '200':
          description: Orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      type: object
  /api/v1/store/panel/orders/{order_id}:
    get:
      tags:
      - Orders
      summary: Get panel order detail
      description: 'Returns full panel order detail including items with cost/margin, shipping info,

        payment data, and status history. Requires Bearer token + X-Tenant-ID header

        with MANAGE_ORDERS grant.

        '
      operationId: getPanelOrderDetail
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      - name: order_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Order detail
          content:
            application/json:
              schema:
                type: object
  /api/v1/store/panel/orders/{order_id}/cancel:
    post:
      tags:
      - Orders
      summary: Cancel panel order
      description: 'Cancels an order from the seller panel. Accepts an optional reason and a refund

        flag to automatically process a refund. Requires Bearer token + X-Tenant-ID

        header with MANAGE_ORDERS grant.

        '
      operationId: cancelPanelOrder
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      - name: order_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Cancelled
          content:
            application/json:
              schema:
                type: object
  /api/v1/store/panel/orders/{order_id}/complete:
    post:
      tags:
      - Orders
      summary: Complete order
      description: 'Manually marks an order as completed by the seller. Used when automatic

        completion is not triggered. Requires Bearer token + X-Tenant-ID header with

        MANAGE_ORDERS grant.

        '
      operationId: completeOrder
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      - name: order_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Completed
          content:
            application/json:
              schema:
                type: object
  /api/v1/store/panel/orders/{order_id}/notes:
    patch:
      tags:
      - Orders
      summary: Update order notes
      description: 'Updates seller-facing and internal notes on an order. Accepts seller_notes

        (visible to buyer) and internal_notes (private). Requires Bearer token +

        X-Tenant-ID header with MANAGE_ORDERS grant.

        '
      operationId: updateOrderNotes
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      - name: order_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
  /api/v1/store/panel/orders/{order_id}/process:
    post:
      tags:
      - Orders
      summary: Process order
      description: 'Moves an order from PAID to PROCESSING status, indicating the seller has started

        preparing the order. Requires Bearer token + X-Tenant-ID header with MANAGE_ORDERS grant.

        '
      operationId: processOrder
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      - name: order_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Processed
          content:
            application/json:
              schema:
                type: object
  /api/v1/store/panel/orders/{order_id}/ready:
    post:
      tags:
      - Orders
      summary: Mark order ready for pickup
      description: 'Marks an order as ready for in-store pickup by the buyer. Used for orders

        with PICKUP delivery method. Requires Bearer token + X-Tenant-ID header with

        MANAGE_ORDERS grant.

        '
      operationId: readyOrder
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      - name: order_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                type: object
  /api/v1/store/panel/orders/{order_id}/refund:
    post:
      tags:
      - Orders
      summary: Refund order
      description: 'Issues a full or partial refund for an order. Accepts refund amount, reason,

        and optionally specific items with quantities. Requires Bearer token + X-Tenant-ID

        header with MANAGE_ORDERS grant.

        '
      operationId: refundOrder
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      - name: order_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Refunded
          content:
            application/json:
              schema:
                type: object
  /api/v1/store/panel/orders/{order_id}/ship:
    post:
      tags:
      - Orders
      summary: Ship order
      description: 'Marks an order as shipped with carrier and tracking information. Requires carrier,

        tracking_number, and optionally estimated_delivery. Requires Bearer token +

        X-Tenant-ID header with MANAGE_ORDERS grant.

        '
      operationId: shipOrder
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      - name: order_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Shipped
          content:
            application/json:
              schema:
                type: object
  /api/v1/store/panel/products:
    get:
      tags:
      - Products
      summary: List panel products
      description: 'Lists products in the tenant''s store panel. Supports filtering by status, category,

        game, visibility, stock level, price range, tags, and card condition. Paginated

        (max 100 per page). Requires Bearer token + X-Tenant-ID header with MANAGE_INVENTORY grant.

        '
      operationId: listPanelProducts
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      responses:
        '200':
          description: Products
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      type: object
    post:
      tags:
      - Products
      summary: Create product
      description: 'Creates a new product in the tenant''s store. Name and price are required. Returns

        DUPLICATE_SKU (400) if the SKU already exists, or PLAN_LIMIT_REACHED (403) if the

        tenant has hit their product limit. Requires Bearer token + X-Tenant-ID header

        with MANAGE_INVENTORY grant.

        '
      operationId: createProduct
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                type: object
  /api/v1/store/panel/products/bulk-action:
    post:
      tags:
      - Products
      summary: Bulk action on products
      description: 'Performs a bulk action (archive, activate, delete) on multiple products at once.

        Accepts a list of product_ids and an action string. Returns success and failure

        counts. Requires Bearer token + X-Tenant-ID header with MANAGE_INVENTORY grant.

        '
      operationId: bulkProductAction
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Bulk result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success_count:
                    type: integer
                  failed_count:
                    type: integer
  /api/v1/store/panel/products/{product_id}:
    get:
      tags:
      - Products
      summary: Get panel product
      description: 'Returns full product detail in the tenant panel view, including variants, images,

        inventory, and cost data. Requires Bearer token + X-Tenant-ID header with

        MANAGE_INVENTORY grant.

        '
      operationId: getPanelProduct
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      - name: product_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Product
          content:
            application/json:
              schema:
                type: object
    patch:
      tags:
      - Products
      summary: Update product
      description: 'Partially updates a product in the tenant''s store. Only send the fields to change.

        Requires Bearer token + X-Tenant-ID header with MANAGE_INVENTORY grant.

        '
      operationId: updateProduct
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      - name: product_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
    delete:
      tags:
      - Products
      summary: Delete product
      description: 'Deletes a product from the tenant''s store. Returns PRODUCT_HAS_PENDING_ORDERS (409)

        if the product has active orders. Requires Bearer token + X-Tenant-ID header with

        MANAGE_INVENTORY grant.

        '
      operationId: deleteProduct
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      - name: product_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
  /api/v1/store/panel/products/{product_id}/images:
    post:
      tags:
      - Products
      summary: Add product image
      description: 'Adds an image to a product. Accepts url, alt_text, sort_order, is_primary,

        width, and height. Requires Bearer token + X-Tenant-ID header with

        MANAGE_INVENTORY grant.

        '
      operationId: addProductImage
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      - name: product_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Image added
          content:
            application/json:
              schema:
                type: object
  /api/v1/store/panel/products/{product_id}/images/reorder:
    put:
      tags:
      - Products
      summary: Reorder product images
      description: 'Sets the display order of product images by providing an ordered list of image_ids.

        Requires Bearer token + X-Tenant-ID header with MANAGE_INVENTORY grant.

        '
      operationId: reorderProductImages
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      - name: product_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Reordered
          content:
            application/json:
              schema:
                type: object
  /api/v1/store/panel/products/{product_id}/images/{image_id}:
    patch:
      tags:
      - Products
      summary: Update product image
      description: 'Updates metadata for a product image (alt_text, sort_order, is_primary).

        Requires Bearer token + X-Tenant-ID header with MANAGE_INVENTORY grant.

        '
      operationId: updateProductImage
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      - name: product_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: image_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
    delete:
      tags:
      - Products
      summary: Delete product image
      description: 'Deletes an image from a product. Requires Bearer token + X-Tenant-ID header

        with MANAGE_INVENTORY grant.

        '

        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
    delete:
      tags:
      - Tenants
      summary: Delete payment method
      description: 'Remove a payment method from the tenant.

        Requires auth, X-Tenant-ID header, and MANAGE_SETTINGS grant.

        '
      operationId: deletePaymentMethod
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      - name: payment_method_id
        in: path

  /api/v1/tenants/me/schedules:
    get:
      tags:
      - Tenants
      summary: Get tenant schedules
      description: 'Retrieve the weekly schedule (7 days) and any date-specific overrides for the tenant.

        Requires auth, X-Tenant-ID header, and MANAGE_STORE grant.

        '
      operationId: getTenantSchedules
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      responses:
        '200':
          description: Schedules
          content:
            application/json:
              schema:
                type: object
                properties:
                  schedules:
                    type: array
                    items:
                      type: object
                  overrides:
                    type: array
                    items:
                      type: object
    put:
      tags:
      - Tenants
      summary: Batch update schedules
      description: 'Replace all 7 days of the weekly schedule at once. Each entry specifies day_of_week,

        opens_at, closes_at, and is_closed. Requires auth, X-Tenant-ID, and MANAGE_SETTINGS grant.

        '
      operationId: updateTenantSchedules
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
  /api/v1/tenants/me/schedules/overrides:
    post:
      tags:
      - Tenants
      summary: Create schedule override
      description: 'Create a one-time schedule override for a specific date (e.g., holidays or special hours).

        Overrides take precedence over the weekly schedule. Requires auth, X-Tenant-ID, and MANAGE_SETTINGS grant.

        '
      operationId: createScheduleOverride
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Override created
          content:
            application/json:
              schema:
                type: object
  /api/v1/tenants/me/schedules/overrides/{override_id}:
    delete:
      tags:
      - Tenants
      summary: Delete schedule override
      description: 'Remove a schedule override by ID, reverting that date to the regular weekly schedule.

        Requires auth, X-Tenant-ID header, and MANAGE_SETTINGS grant.

        '
      operationId: deleteScheduleOverride
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      - name: override_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
  /api/v1/tenants/me/slug:
    post:
      tags:
      - Tenants
      summary: Set tenant slug
      description: 'Change the tenant''s URL slug. Slug must be 3-60 chars, lowercase alphanumeric + hyphens.

        Can only be changed once every 30 days. Requires auth, X-Tenant-ID, and MANAGE_SETTINGS grant.

        '
      operationId: setTenantSlug
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - slug
              properties:
                slug:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
  /api/v1/tenants/me/social-links:
    get:
      tags:
      - Tenants
      summary: Get tenant social links
      description: 'List the tenant''s configured social media links (Instagram, Facebook, etc.).

        Requires auth, X-Tenant-ID header, and MANAGE_STORE grant.

        '
      operationId: getTenantSocialLinks
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      responses:
        '200':
          description: Social links
          content:
            application/json:
              schema:
                type: object
                properties:
                  social_links:
                    type: array
                    items:
                      type: object
    put:
      tags:
      - Tenants
      summary: Update tenant social links
      description: 'Batch update all social media links. Provide the full list of links; this replaces existing entries.

        Each link has platform, url, is_active, and sort_order. Requires auth, X-Tenant-ID, and MANAGE_SETTINGS grant.

        '
      operationId: updateTenantSocialLinks
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
  /api/v1/tenants/me/staff:
    get:
      tags:
      - Staff
      summary: List staff members
      description: 'List all staff members with their roles, grant overrides, and effective grants.

        Also returns max_staff and current_staff counts based on the tenant plan.

        Requires auth, X-Tenant-ID header, and MANAGE_STAFF grant.

        '
      operationId: listStaff
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      responses:
        '200':
          description: Staff list
          content:
            application/json:
              schema:
                type: object
                properties:
                  staff:
                    type: array
                    items:
                      $ref: '#/components/schemas/StaffMember'
  /api/v1/tenants/me/staff/invitations:
    get:
      tags:
      - Staff
      summary: List staff invitations
      description: 'List all pending staff invitations for the tenant.

        Requires auth, X-Tenant-ID header, and MANAGE_STAFF grant.

        '
      operationId: listStaffInvitations
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      responses:
        '200':
          description: Invitations
          content:
            application/json:
              schema:
                type: object
                properties:
                  invitations:
                    type: array
                    items:
                      type: object
  /api/v1/tenants/me/staff/invitations/{invitation_id}:
    delete:
      tags:
      - Staff
      summary: Cancel staff invitation
      description: 'Revoke a pending staff invitation by its ID before the invitee accepts.

        Requires auth, X-Tenant-ID header, and MANAGE_STAFF grant.

        '
      operationId: cancelStaffInvitation
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      - name: invitation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
  /api/v1/tenants/me/staff/invite:
    post:
      tags:
      - Staff
      summary: Invite staff member
      description: 'Send a staff invitation. Provide either user_id or email to identify the invitee.

        Role must be ADMIN, JUDGE, or CASHIER (OWNER cannot be assigned via invite).

        Requires auth, X-Tenant-ID header, and MANAGE_STAFF grant.

        '
      operationId: inviteStaff
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - role
              properties:
                user_id:
                  type: string
                  format: uuid
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum:
                  - ADMIN
                  - JUDGE
                  - CASHIER
                message:
                  type: string
      responses:
        '201':
          description: Invitation sent
          content:
            application/json:
              schema:
                type: object
  /api/v1/tenants/me/staff/{staff_id}:
    delete:
      tags:
      - Staff
      summary: Remove staff member
      description: 'Remove a staff member from the tenant. The OWNER cannot be removed.

        Requires auth, X-Tenant-ID header, and MANAGE_STAFF grant.

        '
      operationId: removeStaffMember
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      - name: staff_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
  /api/v1/tenants/me/staff/{staff_id}/grants:
    post:
      tags:
      - Staff
      summary: Set staff grant override
      description: 'Add or update a grant override for a staff member. Set is_granted to true to grant

        a permission the role does not include, or false to revoke one the role provides.

        Requires auth, X-Tenant-ID header, and MANAGE_STAFF grant.

        '
      operationId: setStaffGrant
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      - name: staff_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - grant_code
              - is_granted
              properties:
                grant_code:
                  type: string
                is_granted:
                  type: boolean
                reason:
                  type: string
      responses:
        '200':
          description: Grant set
          content:
            application/json:
              schema:
                type: object
  /api/v1/tenants/me/staff/{staff_id}/grants/{grant_code}:
    delete:
      tags:
      - Staff
      summary: Remove staff grant override
      description: 'Remove a grant override for a staff member, reverting the grant to the role''s default.

        Requires auth, X-Tenant-ID header, and MANAGE_STAFF grant.

        '
      operationId: removeStaffGrant
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      - name: staff_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: grant_code
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
  /api/v1/tenants/me/staff/{staff_id}/role:
    patch:
      tags:
      - Staff
      summary: Update staff role
      description: 'Change a staff member''s role to ADMIN, JUDGE, or CASHIER. The OWNER role cannot

        be assigned this way; use the transfer-ownership endpoint instead.

        Requires auth, X-Tenant-ID header, and MANAGE_STAFF grant.

        '
      operationId: updateStaffRole
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      - name: staff_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - role
              properties:
                role:
                  type: string
                  enum:
                  - ADMIN
                  - JUDGE
                  - CASHIER
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
  /api/v1/tenants/me/subscription:
    get:
      tags:
      - Subscriptions
      summary: Get subscription details
      description: 'Get the tenant''s current subscription plan, usage stats, and available plan options.

        Plans: STARTER, PRO, BUSINESS, ENTERPRISE.

        Requires auth, X-Tenant-ID header, and MANAGE_SUBSCRIPTION grant.

        '
      operationId: getSubscription
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      responses:
        '200':
          description: Subscription
          content:
            application/json:
              schema:
                type: object
  /api/v1/tenants/me/subscription/cancel:
    post:
      tags:
      - Subscriptions
      summary: Cancel subscription
      description: 'Cancel the tenant''s subscription. The cancellation takes effect at the end of the current

        billing period. An optional reason can be provided. Requires auth, X-Tenant-ID,

        and MANAGE_SUBSCRIPTION grant.

        '
      operationId: cancelSubscription
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Cancelled
          content:
            application/json:
              schema:
                type: object
  /api/v1/tenants/me/subscription/downgrade:
    post:
      tags:
      - Subscriptions
      summary: Downgrade subscription
      description: 'Schedule a subscription downgrade to a lower plan. The downgrade takes effect at the end

        of the current billing period. Requires auth, X-Tenant-ID, and MANAGE_SUBSCRIPTION grant.

        '
      operationId: downgradeSubscription
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - plan_slug
              properties:
                plan_slug:
                  type: string
      responses:
        '200':
          description: Downgrade scheduled
          content:
            application/json:
              schema:
                type: object
  /api/v1/tenants/me/subscription/reactivate:
    post:
      tags:
      - Subscriptions
      summary: Reactivate subscription
      description: 'Reactivate a previously cancelled subscription before the billing period ends.

        Requires auth, X-Tenant-ID header, and MANAGE_SUBSCRIPTION grant.

        '
      operationId: reactivateSubscription
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      responses:
        '200':
          description: Reactivated
          content:
            application/json:
              schema:
                type: object
  /api/v1/tenants/me/subscription/upgrade:
    post:
      tags:
      - Subscriptions
      summary: Upgrade subscription
      description: 'Upgrade the tenant''s subscription to a higher plan. Requires plan_slug, billing_cycle

        (MONTHLY or ANNUAL), and payment_provider (e.g., WEBPAY). Upgrade takes effect immediately.

        Requires auth, X-Tenant-ID header, and MANAGE_SUBSCRIPTION grant.

        '
      operationId: upgradeSubscription
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - plan_slug
              - billing_cycle
              - payment_provider
              properties:
                plan_slug:
                  type: string
                billing_cycle:
                  type: string
                payment_provider:
                  type: string
      responses:
        '200':
          description: Upgrade initiated
          content:
            application/json:
              schema:
                type: object
  /api/v1/tenants/me/transfer-ownership:
    post:
      tags:
      - Staff
      summary: Transfer tenant ownership
      description: 'Transfer tenant ownership to another existing staff member. Only the current OWNER can perform this.

        Requires the owner''s current password for confirmation. The previous owner is demoted to ADMIN.

        Requires auth and X-Tenant-ID header.

        '
      operationId: transferOwnership
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/XTenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - new_owner_staff_id
              - password
              properties:
                new_owner_staff_id:
                  type: string
                  format: uuid
                password:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TournamentId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MatchId:
      name: match_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        default: 20
    XTenantId:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Tenant scope header
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    MessageResponse:
      description: Success message
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
  schemas:
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
    RegisterRequest:
      type: object
      required:
      - username
      - email
      - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 30
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
    Tenant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        status:
          type: string
        city:
          type: string
        region:
          type: string
        country:
          type: string
        logo_url:
          type: string
        is_public:
          type: boolean
        created_at:
          type: string
          format: date-time
    Event:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
    StaffMember:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        username:
          type: string
        role:
          type: string
          enum:
          - OWNER
          - ADMIN
          - JUDGE
          - CASHIER
        grants:
          type: array
          items:
            type: string
    Expense:
      type: object
      properties:
        id:
          type: string
          format: uuid
        amount:
          type: number
        category:
          type: string
        description:
          type: string
        date:
          type: string
          format: date
        is_recurring:
          type: boolean
        receipt_url:
          type: string
        created_at:
          type: string
          format: date-time
    CreateExpenseRequest:
      type: object
      required:
      - amount
      - category
      - date
